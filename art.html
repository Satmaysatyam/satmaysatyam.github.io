<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Art | Satyam Gupta</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .art-grid-layout {
      column-count: 3;
      column-gap: 24px;
      padding-top: 10px;
      margin-top: 20px;
    }
    .art-card-new {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(13,33,25,0.06);
      background: transparent;
      border: none;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      display: inline-block; /* Crucial for CSS masonry to prevent breaking across columns */
      width: 100%;
      margin-bottom: 24px;
    }
    .art-card-new:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 20px 48px rgba(13,33,25,0.15);
      z-index: 10;
    }
    .art-img-wrap {
      width: 100%;
      position: relative;
      overflow: hidden;
      background: #0d1a14;
      border-radius: var(--radius);
    }
    .art-img-wrap img {
      width: 100%;
      height: auto;
      display: block;
      /* Aesthetic editing/filtering logic via CSS */
      filter: contrast(1.05) saturate(1.1) brightness(0.98);
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), filter 0.6s ease;
    }
    .art-card-new:hover .art-img-wrap img {
      transform: scale(1.04);
      filter: contrast(1.15) saturate(1.2) brightness(1.05);
    }
    @media(max-width: 1080px) {
      .art-grid-layout { column-count: 2; column-gap: 20px; }
    }
    @media(max-width: 600px) {
      .art-grid-layout { column-count: 1; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header dynamically injected by navigation.js -->

    <main class="section-wrap">
      <section id="page-art" class="page">
        <div class="section-title">
          <div>
            <h2>Art</h2>
            <p>A collection of scientific illustrations, field sketches, and natural history paintings. Each piece aims to capture the essence of the subjects beyond what a camera lens provides.</p>
          </div>
          <span class="badge">Visual portfolio</span>
        </div>
        <div class="art-grid-layout" id="artGrid"></div>
      </section>
    </main>

    <!-- Footer dynamically injected by navigation.js -->
  </div>

  <script src="data.js"></script>
  <script src="navigation.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const artGrid = document.getElementById('artGrid');
      artGrid.innerHTML = site.art.map(a => `
        <div class="art-card-new">
          <div class="art-img-wrap">
            <img src="${a.src}" alt="${a.title}" loading="lazy">
          </div>
        </div>
      `).join('');
    });
  </script>
</body>
</html>
