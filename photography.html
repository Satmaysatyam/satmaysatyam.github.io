<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photography | Satyam Gupta</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* --- Gallery Enhancements --- */
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 20px 0 30px;
    }
    .tab {
      border: 1px solid rgba(22, 49, 38, 0.12);
      background: white;
      color: var(--muted);
      padding: 10px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .tab:hover {
      background: rgba(11, 93, 67, 0.05);
      color: var(--ink);
      border-color: var(--brand);
    }
    .tab.active {
      background: var(--brand);
      color: white;
      border-color: transparent;
      box-shadow: 0 10px 24px rgba(11, 93, 67, 0.18);
    }
    
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 24px;
      margin-top: 10px;
    }
    
    .gallery-item {
      background: white;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid rgba(22, 49, 38, 0.08);
      box-shadow: 0 10px 32px rgba(13, 33, 25, 0.05);
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      animation: card-fade-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    @keyframes card-fade-in {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    .gallery-item:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 48px rgba(13, 33, 25, 0.15);
      border-color: rgba(11, 93, 67, 0.2);
    }
    
    /* --- Sliding Carousel Track on Card --- */
    .gallery-img-wrap {
      position: relative;
      height: 380px;
      overflow: hidden;
      background: #f0ebe1;
    }
    
    .carousel-track {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.65s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .carousel-track img {
      flex: 0 0 100%;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.75s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .gallery-item:hover .carousel-track img {
      transform: scale(1.06);
    }
    
    /* Card carousel arrow buttons overlay */
    .card-carousel-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 34px;
      height: 34px;
      background: rgba(8, 18, 14, 0.72);
      backdrop-filter: blur(4px);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 11px;
      z-index: 10;
      opacity: 0;
      transition: all 0.25s ease;
    }
    
    .gallery-item:hover .card-carousel-nav {
      opacity: 1;
    }
    
    .card-carousel-nav:hover {
      background: var(--brand);
      border-color: transparent;
      transform: translateY(-50%) scale(1.1);
    }
    
    .card-carousel-nav.prev {
      left: 12px;
    }
    
    .card-carousel-nav.next {
      right: 12px;
    }
    
    /* Dots indicator overlay on the image */
    .carousel-dots {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 5px;
      z-index: 10;
      background: rgba(8, 18, 14, 0.45);
      backdrop-filter: blur(6px);
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      pointer-events: auto;
    }
    
    .carousel-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.45);
      transition: all 0.25s ease;
      cursor: pointer;
    }
    
    .carousel-dot.active {
      background: white;
      transform: scale(1.2);
      width: 12px;
      border-radius: 3px;
    }
    
    .gallery-badge-top {
      position: absolute;
      top: 14px;
      right: 14px;
      background: rgba(11, 93, 67, 0.82);
      backdrop-filter: blur(8px);
      color: white;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
      border: 1px solid rgba(255, 255, 255, 0.15);
      letter-spacing: 0.02em;
      z-index: 5;
    }
    
    .gallery-info {
      padding: 20px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }
    
    .gallery-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    
    .gallery-emoji {
      font-size: 1.3rem;
    }
    
    .gallery-title {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--ink);
      line-height: 1.3;
    }
    
    .gallery-scientific {
      font-size: 0.85rem;
      font-style: italic;
      color: var(--muted);
      margin-bottom: 12px;
      font-family: "Outfit", Inter, system-ui, sans-serif;
      letter-spacing: 0.01em;
    }
    
    .gallery-desc {
      margin: 0;
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.6;
      flex-grow: 1;
      min-height: 50px;
    }
    
    /* --- Lightbox Modal --- */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      z-index: 1000;
      background: rgba(8, 18, 14, 0.97);
      backdrop-filter: blur(16px);
      display: none;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .lightbox.visible {
      opacity: 1;
      pointer-events: auto;
    }
    
    .lightbox-content-wrap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      transform: translateY(20px) scale(0.95);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .lightbox.visible .lightbox-content-wrap {
      transform: translateY(0) scale(1);
    }
    
    .lightbox-img-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: zoom-in;
      z-index: 10;
    }
    
    .lightbox-img-container.zoomed {
      cursor: zoom-out;
      z-index: 100;
    }
    
    .lightbox-img-container img {
      max-height: 85vh;
      max-width: 90vw;
      border-radius: 16px;
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: #0d1a14;
      object-fit: contain;
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      transform-origin: 50% 50%;
    }
    
    .lightbox-img-container.zoomed img {
      transform: scale(2.5);
    }
    
    .lightbox-caption {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: 92%;
      max-width: 760px;
      z-index: 50;
      margin: 0;
      color: white;
      text-align: left;
      padding: 16px 20px;
      background: rgba(8, 18, 14, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 18px;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    
    .lightbox-zoom-out-btn {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.15);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      z-index: 200;
      display: none;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    .lightbox-img-container.zoomed ~ .lightbox-zoom-out-btn {
      display: block;
    }
    
    .lightbox-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 6px;
    }
    
    .lightbox-title-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .lightbox-title {
      font-size: 1.35rem;
      font-weight: 800;
    }
    
    .lightbox-meta-wrap {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    
    .lightbox-sci {
      font-size: 0.95rem;
      font-style: italic;
      color: rgba(255, 255, 255, 0.65);
      margin-bottom: 10px;
    }
    
    .lightbox-desc {
      font-size: 0.96rem;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.82);
    }
    
    .lightbox-close {
      position: absolute;
      top: 30px;
      right: 30px;
      width: 44px;
      height: 44px;
      font-size: 32px;
      color: white;
      cursor: pointer;
      opacity: 0.65;
      transition: all 0.2s ease;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08);
      z-index: 20;
    }
    
    .lightbox-close:hover {
      opacity: 1;
      background: rgba(255,255,255,0.15);
      transform: scale(1.05);
    }
    
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 32px;
      color: white;
      width: 60px;
      height: 60px;
      cursor: pointer;
      user-select: none;
      opacity: 0.5;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.05);
      z-index: 10;
    }
    
    .lightbox-nav:hover {
      opacity: 1;
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.15);
    }
    
    .lightbox-prev {
      left: 30px;
    }
    
    .lightbox-next {
      right: 30px;
    }
    
    .badge.secondary {
      background: rgba(255, 255, 255, 0.12);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    /* Responsive overrides */
    @media (max-width: 1080px) {
      .gallery-grid {
        grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
        gap: 18px;
      }
      .lightbox-nav {
        width: 48px;
        height: 48px;
        font-size: 24px;
      }
      .lightbox-prev { left: 15px; }
      .lightbox-next { right: 15px; }
    }
    
    @media (max-width: 600px) {
      .gallery-grid { grid-template-columns: 1fr; }
    }
    
    @media (max-width: 760px) {
      .card-carousel-nav {
        opacity: 1;
      }
      .gallery-grid {
        grid-template-columns: 1fr;
      }
      .lightbox-nav {
        display: none; /* Rely on swiping / close on mobile */
      }
      .lightbox-close {
        top: 15px;
        right: 15px;
      }
      .lightbox-caption {
        padding: 14px;
        margin-top: 12px;
        border-radius: 14px;
      }
      .lightbox-title {
        font-size: 1.15rem;
      }
      .lightbox-desc {
        font-size: 0.88rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header dynamically injected by navigation.js -->

    <main class="section-wrap">
      <section id="page-photography" class="page">
        <div class="section-title">
          <div>
            <h2>Photography</h2>
          </div>
          <span class="badge">Nature Portfolio</span>
        </div>
        
        <!-- Filter Tabs -->
        <div class="tabs" id="photoTabs">
          <button class="tab active" data-group="all">All Species</button>
          <button class="tab" data-group="Amphibians">🐸 Amphibians</button>
          <button class="tab" data-group="Reptiles">🐍 Reptiles</button>
          <button class="tab" data-group="Birds">🪶 Birds</button>
          <button class="tab" data-group="Mammals">🐘 Mammals</button>
          <button class="tab" data-group="Invertebrates">🕷️ Invertebrates</button>
        </div>

        <!-- Gallery Grid -->
        <div class="gallery-grid" id="photoGrid"></div>
      </section>
    </main>

    <!-- Footer dynamically injected by navigation.js -->
  </div>

  <!-- Lightbox Modal -->
  <div id="lightbox" class="lightbox">
    <span id="lightboxClose" class="lightbox-close">&times;</span>
    <span id="lightboxPrev" class="lightbox-nav lightbox-prev">&#10094;</span>
    <span id="lightboxNext" class="lightbox-nav lightbox-next">&#10095;</span>
    <div class="lightbox-content-wrap">
      <div class="lightbox-img-container" id="lightboxImgContainer">
        <img id="lightboxImg" src="" alt="Enlarged field photograph" />
      </div>
      <div class="lightbox-caption">
        <div class="lightbox-title-row">
          <div class="lightbox-title-wrap">
            <span id="lightboxEmoji" style="font-size: 1.4rem;"></span>
            <span id="lightboxTitle" class="lightbox-title"></span>
          </div>
          <div class="lightbox-meta-wrap">
            <span id="lightboxCounter" class="badge secondary"></span>
            <span id="lightboxBadge" class="badge"></span>
          </div>
        </div>
        <div id="lightboxSci" class="lightbox-sci"></div>
        <div id="lightboxDesc" class="lightbox-desc"></div>
      </div>
      <div id="lightboxZoomOut" class="lightbox-zoom-out-btn">Zoom Out</div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="navigation.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const photoGrid = document.getElementById('photoGrid');
      const photoTabs = document.getElementById('photoTabs');
      const tabs = photoTabs.querySelectorAll('.tab');
      
      const lightbox = document.getElementById('lightbox');
      const lightboxImgContainer = document.getElementById('lightboxImgContainer');
      const lightboxImg = document.getElementById('lightboxImg');
      const lightboxEmoji = document.getElementById('lightboxEmoji');
      const lightboxTitle = document.getElementById('lightboxTitle');
      const lightboxBadge = document.getElementById('lightboxBadge');
      const lightboxCounter = document.getElementById('lightboxCounter');
      const lightboxSci = document.getElementById('lightboxSci');
      const lightboxDesc = document.getElementById('lightboxDesc');
      const lightboxClose = document.getElementById('lightboxClose');
      const lightboxPrev = document.getElementById('lightboxPrev');
      const lightboxNext = document.getElementById('lightboxNext');
      
      let activeGroup = 'all';
      let filteredPhotos = [...site.photos];
      let activeIntervals = [];
      
      // State for lightbox
      let currentSpeciesIndex = 0;
      let currentImageIndex = 0;
      
      // Render Gallery
      function renderGallery() {
        // Clear all active intervals first
        activeIntervals.forEach(id => clearInterval(id));
        activeIntervals = [];

        filteredPhotos = activeGroup === 'all' 
          ? site.photos 
          : site.photos.filter(p => p.group === activeGroup);
          
        if (filteredPhotos.length === 0) {
          photoGrid.innerHTML = `
            <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--muted);">
              <h3>No photos found in this category.</h3>
            </div>
          `;
          return;
        }
        
        photoGrid.innerHTML = filteredPhotos.map((p, speciesIdx) => {
          const hasMultiple = p.srcs.length > 1;
          
          const imagesHtml = p.srcs.map((src, imgIdx) => `
            <img src="${src}" alt="${p.title}" data-img-index="${imgIdx}" loading="lazy" style="object-position: ${p.objectPosition || 'center'};">
          `).join('');
          
          const trackHtml = `
            <div class="carousel-track">
              ${imagesHtml}
            </div>
          `;
          
          const dotsHtml = hasMultiple ? `
            <div class="carousel-dots">
              ${p.srcs.map((_, imgIdx) => `
                <span class="carousel-dot ${imgIdx === 0 ? 'active' : ''}" data-dot-index="${imgIdx}"></span>
              `).join('')}
            </div>
          ` : '';
          
          const controlsHtml = hasMultiple ? `
            <button class="card-carousel-nav prev" aria-label="Previous image">&#10094;</button>
            <button class="card-carousel-nav next" aria-label="Next image">&#10095;</button>
          ` : '';
          
          return `
            <div class="gallery-item" data-species-index="${speciesIdx}" data-active-img-index="0">
              <div class="gallery-img-wrap">
                ${trackHtml}
                ${controlsHtml}
                ${dotsHtml}
                <div class="gallery-badge-top">${p.group}</div>
              </div>
              <div class="gallery-info">
                <div class="gallery-title-row">
                  <span class="gallery-emoji">${p.emoji}</span>
                  <h3 class="gallery-title">${p.title}</h3>
                </div>
                <div class="gallery-scientific">${p.scientific}</div>
                <p class="gallery-desc">${p.captions[0]}</p>
              </div>
            </div>
          `;
        }).join('');
        
        // Bind carousel triggers & click handlers
        const items = photoGrid.querySelectorAll('.gallery-item');
        items.forEach(item => {
          const speciesIdx = parseInt(item.getAttribute('data-species-index'), 10);
          const p = filteredPhotos[speciesIdx];
          const hasMultiple = p.srcs.length > 1;
          
          let autoScrollInterval = null;
          
          function setActiveImage(imgIdx) {
            item.setAttribute('data-active-img-index', imgIdx);
            
            // Slide the track
            const track = item.querySelector('.carousel-track');
            track.style.transform = `translateX(-${imgIdx * 100}%)`;
            
            // Toggle active dot style
            const dots = item.querySelectorAll('.carousel-dot');
            dots.forEach((dot, idx) => {
              if (idx === imgIdx) {
                dot.classList.add('active');
              } else {
                dot.classList.remove('active');
              }
            });
            
            // Toggle description copy
            const desc = item.querySelector('.gallery-desc');
            if (desc && p.captions[imgIdx]) {
              desc.textContent = p.captions[imgIdx];
            }
          }
          
          function startAutoScroll() {
            stopAutoScroll();
            autoScrollInterval = setInterval(() => {
              let current = parseInt(item.getAttribute('data-active-img-index'), 10);
              let nextIdx = current + 1;
              if (nextIdx >= p.srcs.length) nextIdx = 0;
              setActiveImage(nextIdx);
            }, 2500);
            activeIntervals.push(autoScrollInterval);
          }
          
          function stopAutoScroll() {
            if (autoScrollInterval) {
              clearInterval(autoScrollInterval);
              activeIntervals = activeIntervals.filter(x => x !== autoScrollInterval);
              autoScrollInterval = null;
            }
          }
          
          // Setup manual control events
          if (hasMultiple) {
            const prevBtn = item.querySelector('.card-carousel-nav.prev');
            const nextBtn = item.querySelector('.card-carousel-nav.next');
            const dots = item.querySelectorAll('.carousel-dot');
            
            prevBtn.addEventListener('click', (e) => {
              e.stopPropagation();
              let current = parseInt(item.getAttribute('data-active-img-index'), 10);
              let prevIdx = current - 1;
              if (prevIdx < 0) prevIdx = p.srcs.length - 1;
              setActiveImage(prevIdx);
              if (autoScrollInterval) startAutoScroll();
            });
            
            nextBtn.addEventListener('click', (e) => {
              e.stopPropagation();
              let current = parseInt(item.getAttribute('data-active-img-index'), 10);
              let nextIdx = current + 1;
              if (nextIdx >= p.srcs.length) nextIdx = 0;
              setActiveImage(nextIdx);
              if (autoScrollInterval) startAutoScroll();
            });
            
            dots.forEach((dot, idx) => {
              dot.addEventListener('click', (e) => {
                e.stopPropagation();
                setActiveImage(idx);
                if (autoScrollInterval) startAutoScroll();
              });
            });
            
            // Auto-play on hover (Auto sliding)
            item.addEventListener('mouseenter', startAutoScroll);
            item.addEventListener('mouseleave', stopAutoScroll);
            
            // Touch swiping support
            let touchStartX = 0;
            let touchEndX = 0;
            
            item.addEventListener('touchstart', e => {
              touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });
            
            item.addEventListener('touchend', e => {
              touchEndX = e.changedTouches[0].screenX;
              if (touchEndX < touchStartX - 30) {
                // Swipe left -> Next
                let current = parseInt(item.getAttribute('data-active-img-index'), 10);
                let nextIdx = current + 1;
                if (nextIdx >= p.srcs.length) nextIdx = 0;
                setActiveImage(nextIdx);
                if (autoScrollInterval) startAutoScroll();
              }
              if (touchEndX > touchStartX + 30) {
                // Swipe right -> Prev
                let current = parseInt(item.getAttribute('data-active-img-index'), 10);
                let prevIdx = current - 1;
                if (prevIdx < 0) prevIdx = p.srcs.length - 1;
                setActiveImage(prevIdx);
                if (autoScrollInterval) startAutoScroll();
              }
            }, { passive: true });
          }
          
          // Lightbox click triggers
          function handleOpen() {
            const activeImgIdx = parseInt(item.getAttribute('data-active-img-index'), 10);
            openLightbox(speciesIdx, activeImgIdx);
          }
          
          item.addEventListener('click', (e) => {
            if (e.target.closest('.card-carousel-nav') || e.target.closest('.carousel-dots') || e.target.closest('.carousel-dot')) {
              return;
            }
            handleOpen();
          });
        });
      }
      
      // Tab Filtering Events
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          activeGroup = tab.getAttribute('data-group');
          renderGallery();
        });
      });
      
      // Lightbox Logic
      let scrollPosition = 0;
      
      function openLightbox(speciesIdx, imgIdx) {
        currentSpeciesIndex = speciesIdx;
        currentImageIndex = imgIdx;
        resetZoom();
        updateLightboxContent();
        
        // iOS Safari scroll lock fix
        scrollPosition = window.pageYOffset || document.documentElement.scrollTop;
        document.body.style.position = 'fixed';
        document.body.style.top = `-${scrollPosition}px`;
        document.body.style.width = '100%';
        
        lightbox.style.display = 'block';
        lightbox.offsetHeight; // force reflow
        lightbox.classList.add('visible');
      }
      
      function closeLightbox() {
        lightbox.classList.remove('visible');
        
        // Restore scroll position
        document.body.style.position = '';
        document.body.style.top = '';
        document.body.style.width = '';
        window.scrollTo(0, scrollPosition);
        
        resetZoom();
        setTimeout(() => {
          if (!lightbox.classList.contains('visible')) {
            lightbox.style.display = 'none';
          }
        }, 350);
      }
      
      // Zoom and Pan Handlers
      lightboxImgContainer.addEventListener('click', (e) => {
        lightboxImgContainer.classList.toggle('zoomed');
      });
      
      function resetZoom() {
        lightboxImgContainer.classList.remove('zoomed');
      }
      
      function updateLightboxContent() {
        const p = filteredPhotos[currentSpeciesIndex];
        if (!p) return;
        
        lightboxImg.src = p.srcs[currentImageIndex];
        lightboxEmoji.textContent = p.emoji;
        lightboxTitle.textContent = p.title;
        lightboxBadge.textContent = p.group;
        lightboxSci.textContent = p.scientific;
        lightboxDesc.textContent = p.captions[currentImageIndex] || p.captions[0];
        
        // Update photo counter indicator
        if (p.srcs.length > 1) {
          lightboxCounter.textContent = `${currentImageIndex + 1} of ${p.srcs.length}`;
          lightboxCounter.style.display = 'inline-flex';
        } else {
          lightboxCounter.style.display = 'none';
        }
      }
      
      function navigateLightbox(dir) {
        const p = filteredPhotos[currentSpeciesIndex];
        if (!p) return;
        
        resetZoom();
        
        if (dir === 1) {
          // Go Forward
          if (currentImageIndex + 1 < p.srcs.length) {
            currentImageIndex++;
          } else {
            // Move to next species card
            currentSpeciesIndex++;
            if (currentSpeciesIndex >= filteredPhotos.length) {
              currentSpeciesIndex = 0; // Wrap to first card
            }
            currentImageIndex = 0; // Start at first photo of next card
          }
        } else if (dir === -1) {
          // Go Backward
          if (currentImageIndex - 1 >= 0) {
            currentImageIndex--;
          } else {
            // Move to previous species card
            currentSpeciesIndex--;
            if (currentSpeciesIndex < 0) {
              currentSpeciesIndex = filteredPhotos.length - 1; // Wrap to last card
            }
            const prevSpecies = filteredPhotos[currentSpeciesIndex];
            currentImageIndex = prevSpecies.srcs.length - 1; // Start at last photo of previous card
          }
        }
        updateLightboxContent();
      }
      
      // Close & navigate events
      lightboxClose.addEventListener('click', closeLightbox);
      lightboxPrev.addEventListener('click', (e) => {
        e.stopPropagation();
        navigateLightbox(-1);
      });
      
      document.getElementById('lightboxZoomOut').addEventListener('click', (e) => {
        e.stopPropagation();
        resetZoom();
      });
      
      lightboxNext.addEventListener('click', (e) => {
        e.stopPropagation();
        navigateLightbox(1);
      });
      
      lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) {
          closeLightbox();
        }
      });
      
      // Keyboard Navigation
      document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('visible')) return;
        
        if (e.key === 'Escape') {
          closeLightbox();
        } else if (e.key === 'ArrowRight') {
          navigateLightbox(1);
        } else if (e.key === 'ArrowLeft') {
          navigateLightbox(-1);
        }
      });
      
      // Initial render
      renderGallery();
    });
  </script>
</body>
</html>
