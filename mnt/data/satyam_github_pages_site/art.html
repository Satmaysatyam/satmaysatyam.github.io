<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Art | Satyam Gupta</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .art-grid-layout {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 32px;
      padding-top: 10px;
      margin-top: 20px;
    }
    .art-card-new {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(13,33,25,0.04);
      background: #fdfdfc;
      border: 1px solid rgba(22, 49, 38, 0.08);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
    }
    .art-card-new:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 48px rgba(13,33,25,0.12);
      border-color: rgba(11, 93, 67, 0.15);
    }
    .art-img-wrap {
      width: 100%;
      aspect-ratio: 1 / 1; /* PERFECT SQUARE CROP */
      position: relative;
      overflow: hidden;
      background: #0d1a14;
    }
    .art-img-wrap img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover; /* CROPS TO FILL SQUARE */
      /* Aesthetic editing/filtering logic via CSS */
      filter: contrast(1.1) saturate(1.15) brightness(0.95);
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), filter 0.6s ease;
    }
    .art-card-new:hover .art-img-wrap img {
      transform: scale(1.06);
      filter: contrast(1.15) saturate(1.25) brightness(1.05);
    }
    .art-info {
      padding: 24px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }
    .art-title {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--ink);
      margin: 0 0 8px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .art-medium {
      font-size: 0.8rem;
      color: var(--brand);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }
    .art-desc {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.6;
      margin: 0;
    }
    @media(max-width: 1080px) {
      .art-grid-layout { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px; }
    }
    @media(max-width: 600px) {
      .art-grid-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header dynamically injected by navigation.js -->

    <main class="section-wrap">
      <section id="page-art" class="page">
        <div class="section-title">
          <div>
            <h2>Art</h2>
            <p>A collection of scientific illustrations, field sketches, and natural history paintings. Each piece aims to capture the essence of the subjects beyond what a camera lens provides.</p>
          </div>
          <span class="badge">Visual portfolio</span>
        </div>
        <div class="art-grid-layout" id="artGrid"></div>
      </section>
    </main>

    <!-- Footer dynamically injected by navigation.js -->
  </div>

  <script src="data.js"></script>
  <script src="navigation.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const artGrid = document.getElementById('artGrid');
      artGrid.innerHTML = site.art.map(a => `
        <div class="art-card-new">
          <div class="art-img-wrap">
            <img src="${a.src}" alt="${a.title}" loading="lazy">
          </div>
          <div class="art-info">
            <h3 class="art-title">${a.emoji} ${a.title}</h3>
            <div class="art-medium">${a.medium}</div>
            <p class="art-desc">${a.note}</p>
          </div>
        </div>
      `).join('');
    });
  </script>
</body>
</html>
