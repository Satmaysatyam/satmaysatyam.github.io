<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publications | Satyam Gupta</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* --- Publications Page Styling --- */
    .pub-card {
      background: white;
      border: 1px solid rgba(22, 49, 38, 0.08);
      border-radius: var(--radius);
      box-shadow: 0 10px 32px rgba(13, 33, 25, 0.05);
      overflow: hidden;
      margin-bottom: 30px;
      display: grid;
      grid-template-columns: 1.25fr 0.75fr;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .pub-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 48px rgba(13, 33, 25, 0.08);
      border-color: rgba(11, 93, 67, 0.15);
    }
    
    .pub-info {
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    
    .pub-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    
    .pub-year-badge {
      background: var(--brand);
      color: white;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    
    .pub-journal {
      font-size: 0.88rem;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    
    .pub-title {
      margin: 0 0 12px;
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--ink);
      line-height: 1.3;
    }
    
    .pub-authors {
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.58;
      margin-bottom: 14px;
    }
    
    .pub-authors strong {
      color: var(--brand);
      font-weight: 800;
    }
    
    .pub-note {
      font-size: 0.94rem;
      color: var(--muted);
      line-height: 1.6;
      margin: 0 0 22px;
      background: rgba(11, 93, 67, 0.03);
      border-left: 4px solid var(--brand);
      padding: 12px 16px;
      border-radius: 0 10px 10px 0;
    }
    
    .pub-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .pub-actions .btn-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.88rem;
      transition: all 0.25s;
      border: 1px solid rgba(22, 49, 38, 0.12);
      background: white;
      color: var(--ink);
      cursor: pointer;
    }
    
    .pub-actions .btn-link.primary {
      background: var(--brand);
      color: white;
      border-color: transparent;
    }
    
    .pub-actions .btn-link.primary:hover {
      background: #084934;
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(11, 93, 67, 0.15);
    }
    
    .pub-actions .btn-link.secondary:hover {
      border-color: var(--brand);
      color: var(--brand);
      transform: translateY(-2px);
    }
    
    .pub-visual {
      position: relative;
      overflow: hidden;
      background: #f0ebe1;
      height: 100%;
      min-height: 280px;
    }
    
    .pub-visual img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .pub-card:hover .pub-visual img {
      transform: scale(1.04);
    }
    
    .pub-caption {
      position: absolute;
      bottom: 0;
      inset-inline: 0;
      background: linear-gradient(180deg, transparent, rgba(8,18,14,0.85));
      color: white;
      padding: 18px 20px;
      font-size: 0.82rem;
      font-weight: 600;
    }
    
    .pub-caption span {
      font-style: italic;
      opacity: 0.95;
    }
    
    /* --- Citation Modal --- */
    .modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(8, 18, 14, 0.5);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .modal.visible {
      opacity: 1;
      pointer-events: auto;
    }
    
    .modal-content {
      background: white;
      border-radius: var(--radius);
      border: 1px solid rgba(22, 49, 38, 0.08);
      box-shadow: 0 30px 90px rgba(13, 33, 25, 0.15);
      max-width: 650px;
      width: 90%;
      padding: 30px;
      position: relative;
      transform: translateY(20px) scale(0.95);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .modal.visible .modal-content {
      transform: translateY(0) scale(1);
    }
    
    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 24px;
      color: var(--muted);
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(22, 49, 38, 0.04);
      transition: all 0.2s;
    }
    
    .modal-close:hover {
      color: var(--ink);
      background: rgba(22, 49, 38, 0.08);
    }
    
    .modal-title {
      margin: 0 0 16px;
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--ink);
      padding-right: 30px;
      line-height: 1.35;
    }
    
    .modal-tabs {
      display: flex;
      border-bottom: 1px solid rgba(22, 49, 38, 0.08);
      gap: 4px;
      margin-bottom: 18px;
      overflow-x: auto;
    }
    
    .modal-tab {
      border: 0;
      background: transparent;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.88rem;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }
    
    .modal-tab:hover {
      color: var(--ink);
    }
    
    .modal-tab.active {
      color: var(--brand);
      border-bottom-color: var(--brand);
    }
    
    .modal-body {
      position: relative;
    }
    
    .citation-box {
      width: 100%;
      min-height: 110px;
      background: rgba(11, 93, 67, 0.03);
      border: 1px solid rgba(11, 93, 67, 0.08);
      border-radius: var(--radius2);
      padding: 16px 16px 16px 16px;
      font-size: 0.9rem;
      line-height: 1.55;
      color: var(--ink);
      white-space: pre-wrap;
      word-break: break-word;
      font-family: Inter, system-ui, sans-serif;
    }
    
    .citation-box.code-font {
      font-family: monospace;
      font-size: 0.78rem;
      color: #0c3325;
      background: #f4f8f6;
    }
    
    .copy-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: white;
      border: 1px solid rgba(22, 49, 38, 0.12);
      color: var(--ink);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.03);
    }
    
    .copy-btn:hover {
      border-color: var(--brand);
      color: var(--brand);
    }
    
    .copy-btn.copied {
      background: var(--brand);
      color: white;
      border-color: transparent;
    }
    
    @media (max-width: 900px) {
      .pub-card {
        grid-template-columns: 1fr;
      }
      .pub-visual {
        min-height: 220px;
        order: -1; /* Image at the top on mobile */
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header dynamically injected by navigation.js -->

    <main class="section-wrap">
      <section id="page-publications" class="page">
        <div class="section-title">
          <div>
            <h2>Publications</h2>
            <p>Peer-reviewed journal articles and scientific contributions. Citations are ready to copy in all major research formats.</p>
          </div>
          <span class="badge">Selected Outputs</span>
        </div>
        
        <!-- Publications List Container -->
        <div class="pub-list" id="pubList"></div>
      </section>
    </main>

    <!-- Footer dynamically injected by navigation.js -->
  </div>

  <!-- Citation Dialog Modal -->
  <div id="citationModal" class="modal">
    <div class="modal-content">
      <span id="modalClose" class="modal-close">&times;</span>
      <h3 class="modal-title">Cite Paper</h3>
      
      <!-- Citation Format Selector Tabs -->
      <div class="modal-tabs">
        <button class="modal-tab active" data-format="apa">APA 7</button>
        <button class="modal-tab" data-format="mla">MLA 9</button>
        <button class="modal-tab" data-format="chicago">Chicago 17</button>
        <button class="modal-tab" data-format="bibtex">BibTeX</button>
      </div>
      
      <div class="modal-body">
        <div id="citationBox" class="citation-box"></div>
        <button id="copyBtn" class="copy-btn">
          <span>📋 Copy citation</span>
        </button>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="navigation.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const pubList = document.getElementById('pubList');
      const modal = document.getElementById('citationModal');
      const modalClose = document.getElementById('modalClose');
      const modalTabs = modal.querySelectorAll('.modal-tab');
      const citationBox = document.getElementById('citationBox');
      const copyBtn = document.getElementById('copyBtn');
      
      let selectedPub = null;
      let selectedFormat = 'apa';
      
      // Highlight authorship on rendering
      function highlightAuthor(authorsString) {
        return authorsString.replace('Satyam Gupta', '<strong>Satyam Gupta</strong>');
      }
      
      // Render Publications Grid
      function renderPublications() {
        pubList.innerHTML = site.publications.map((p, idx) => `
          <div class="pub-card">
            <div class="pub-info">
              <div>
                <div class="pub-header">
                  <span class="pub-year-badge">${p.year}</span>
                  <span class="pub-journal">${p.journal} • ${p.volume}</span>
                </div>
                <h3 class="pub-title">${p.title}</h3>
                <div class="pub-authors">${highlightAuthor(p.authors)}</div>
                <p class="pub-note">${p.note}</p>
              </div>
              <div class="pub-actions">
                <a href="${p.url}" target="_blank" class="btn-link primary">
                  View Publisher (DOI)
                </a>
                <button class="btn-link secondary cite-trigger" data-id="${p.id}">
                  📋 Cite Paper
                </button>
              </div>
            </div>
            <div class="pub-visual">
              <img src="${p.img}" alt="${p.title}" loading="lazy">
              <div class="pub-caption">
                <span>${p.id === 'bird_flocks' ? '📊' : '📸'} ${p.speciesName}</span>
                ${p.imgCredit ? `<br><span class="pub-credit" style="font-size: 0.72rem; opacity: 0.8; font-weight: normal; margin-top: 4px; display: inline-block;">Photo: ${p.imgCredit}</span>` : ''}
              </div>
            </div>
          </div>
        `).join('');
        
        // Add click events to Cite triggers
        const triggers = pubList.querySelectorAll('.cite-trigger');
        triggers.forEach(trig => {
          trig.addEventListener('click', () => {
            const pubId = trig.getAttribute('data-id');
            const found = site.publications.find(p => p.id === pubId);
            if (found) {
              openCitationModal(found);
            }
          });
        });
      }
      
      // Open modal
      function openCitationModal(pub) {
        selectedPub = pub;
        selectedFormat = 'apa';
        
        // Reset tabs active class
        modalTabs.forEach(t => {
          if (t.getAttribute('data-format') === 'apa') {
            t.classList.add('active');
          } else {
            t.classList.remove('active');
          }
        });
        
        updateCitationText();
        modal.classList.add('visible');
        document.body.style.overflow = 'hidden';
      }
      
      // Close modal
      function closeCitationModal() {
        modal.classList.remove('visible');
        document.body.style.overflow = '';
      }
      
      // Update modal text block
      function updateCitationText() {
        if (!selectedPub) return;
        const text = selectedPub.citations[selectedFormat];
        citationBox.textContent = text;
        
        // Use monospace block for BibTeX format
        if (selectedFormat === 'bibtex') {
          citationBox.classList.add('code-font');
        } else {
          citationBox.classList.remove('code-font');
        }
      }
      
      // Tab selector events
      modalTabs.forEach(tab => {
        tab.addEventListener('click', () => {
          modalTabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          selectedFormat = tab.getAttribute('data-format');
          updateCitationText();
        });
      });
      
      // Close triggers
      modalClose.addEventListener('click', closeCitationModal);
      modal.addEventListener('click', (e) => {
        if (e.target === modal) {
          closeCitationModal();
        }
      });
      
      // Escape key triggers modal close
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.classList.contains('visible')) {
          closeCitationModal();
        }
      });
      
      // Clipboard copy handling
      copyBtn.addEventListener('click', () => {
        if (!selectedPub) return;
        const text = selectedPub.citations[selectedFormat];
        
        navigator.clipboard.writeText(text).then(() => {
          copyBtn.classList.add('copied');
          copyBtn.querySelector('span').textContent = '✅ Copied!';
          
          setTimeout(() => {
            copyBtn.classList.remove('copied');
            copyBtn.querySelector('span').textContent = '📋 Copy citation';
          }, 2000);
        }).catch(err => {
          console.error('Failed to copy text: ', err);
        });
      });
      
      // Initial render
      renderPublications();
    });
  </script>
</body>
</html>
